<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shared Dashboard — XRay</title>
<style>
  :root { --bg:#08090c; --bg2:#0f1117; --t1:#f0f1f4; --t2:#8e91a0; --acc:#3ee8b5; --bdr:rgba(255,255,255,0.06); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--t1); height: 100%; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
  .share-bar {
    height: 48px; background: var(--bg2); border-bottom: 1px solid var(--bdr);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
    flex-shrink: 0;
  }
  .share-bar a { text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .share-bar .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .share-bar .logo .x { color: #fff; }
  .share-bar .logo .r { color: var(--acc); }
  .share-bar .logo-icon {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  }
  .share-bar .logo-icon svg { width: 22px; height: 22px; }
  .share-content { width: 100%; flex: 1; min-height: 0; overflow: hidden; }
  .share-content iframe { width: 100%; height: 100%; border: none; background: var(--bg); }
  .share-loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--t2); gap: 10px; font-size: 14px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--bdr);
    border-top-color: var(--acc); border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .share-error {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--t2); gap: 12px; font-size: 15px;
  }
  .share-error svg { opacity: .3; }
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
<div class="share-bar">
  <a href="/">
    <span class="logo-icon">
      <svg viewBox="0 0 36 36" style="width:22px;height:22px"><g transform="translate(18,18)"><circle r="2.8" fill="#3ee8b5"/><path d="M-2.5,-4.33L-6,-10.39A12,12,0,0,1,6,-10.39L2.5,-4.33A5,5,0,0,0,-2.5,-4.33Z" fill="#3ee8b5" opacity=".85"/><path d="M-2.5,-4.33L-6,-10.39A12,12,0,0,1,6,-10.39L2.5,-4.33A5,5,0,0,0,-2.5,-4.33Z" fill="#3ee8b5" opacity=".85" transform="rotate(120)"/><path d="M-2.5,-4.33L-6,-10.39A12,12,0,0,1,6,-10.39L2.5,-4.33A5,5,0,0,0,-2.5,-4.33Z" fill="#3ee8b5" opacity=".85" transform="rotate(240)"/></g></svg>
    </span>
    <span class="logo"><span class="x">X</span><span class="r">Ray</span></span>
  </a>
</div>
<div class="share-content" id="share-content">
  <div class="share-loading"><div class="spinner"></div> Loading dashboard...</div>
</div>
<script>
(function() {
  var parts = window.location.pathname.split('/');
  var token = parts[parts.length - 1];
  if (!token) { showError('No share token provided'); return; }

  // No sessionStorage cache. Public share links are security-scoped
  // (Rotate + Revoke are supposed to invalidate them immediately), and
  // caching the render body keyed by token meant a hard-refresh after
  // rotation still rendered the old dashboard from the tab's local
  // store. Server-side share-cache (share.routes.ts) is the
  // performance layer; the client always re-fetches.
  fetchDashboard();
  subscribeShareWs();

  function fetchDashboard() {
    fetch('/api/share/' + encodeURIComponent(token))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.ok) {
          showError((d.error && d.error.message) || 'This dashboard is no longer available.');
          return;
        }
        renderDashboard(d.data);
      })
      .catch(function() {
        showError('Failed to load dashboard. Please try again later.');
      });
  }

  // Open a minimal public WebSocket subscription so the server can
  // kick this page when the admin Rotates or Revokes the share
  // link. No JWT \u2014 the share token itself is the identifier. On
  // receipt of share:revoked we blow away the rendered iframe and
  // show the standard "share link revoked" screen.
  function subscribeShareWs() {
    try {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var ws = new WebSocket(proto + '//' + location.host + '/ws?share_token=' + encodeURIComponent(token));
      ws.onmessage = function(evt) {
        try {
          var msg = JSON.parse(evt.data);
          if (msg && msg.type === 'share:revoked') {
            showError('Dashboard not found or share link has been revoked');
            try { ws.close(); } catch(e) {}
          }
        } catch(e) {}
      };
    } catch(e) {}
  }

  function renderDashboard(data) {
    document.title = (data.name || 'Dashboard') + ' \u2014 XRay';
    var content = document.getElementById('share-content');
    var iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-forms allow-popups allow-same-origin';
    content.innerHTML = '';
    content.appendChild(iframe);
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#08090c;color:#f0f1f4}' + (data.css || '') + '</style></head><body>' + (data.html || '') + '<scr' + 'ipt>' + (data.js || '') + '</scr' + 'ipt></body></html>');
    doc.close();
  }

  function showError(msg) {
    document.getElementById('share-content').innerHTML = '<div class="share-error"><svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" fill="none" stroke-width="1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>' + msg + '</p></div>';
  }
})();
</script>
</body>
</html>
