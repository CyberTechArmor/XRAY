name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Custom config replaces the inline `queries:` arg — the
          # config still uses `security-and-quality` but excludes one
          # rule (js/missing-token-validation) that has no path-level
          # granularity. See .github/codeql/codeql-config.yml for the
          # full rationale.
          config-file: .github/codeql/codeql-config.yml

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
