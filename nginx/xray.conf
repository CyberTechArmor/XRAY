# XRay Platform — NGINX Site Configuration
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting removed

upstream xray_server {
    server 127.0.0.1:3200;  # matches APP_PORT in docker-compose
}

server {
    listen 443 ssl http2;
    server_name app.xray.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/xray.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xray.yourdomain.com/privkey.pem;

    # Static files (index.html + general bundle)
    root /var/www/xray;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /index.html {
        add_header Cache-Control "no-cache";
    }

    location /bundles/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # API proxy — auth routes (stricter rate limit)
    location /api/auth/ {

        proxy_pass http://xray_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy — all other routes
    location /api/ {

        proxy_pass http://xray_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Embed subdomain
server {
    listen 443 ssl http2;
    server_name embed.xray.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/xray.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xray.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://xray_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTP redirect
server {
    listen 80;
    server_name app.xray.yourdomain.com embed.xray.yourdomain.com;
    return 301 https://$host$request_uri;
}
