version: '3.8'

services:
  server:
    build:
      # Build context is the repo root so the Dockerfile can COPY both server/
      # and migrations/ (migrations are read at startup for self-healing).
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      # Application connects as DB_APP_USER (a non-owner non-super role
      # so RLS policies actually fire). Falls back to DB_USER on installs
      # that haven't yet run the role-split migration in install.sh /
      # update.sh — those keep working but RLS stays decorative until
      # the operator picks up the new install.sh / update.sh path.
      - DATABASE_URL=postgresql://${DB_APP_USER:-${DB_USER:-xray}}:${DB_APP_PASSWORD:-${DB_PASSWORD}}@${DB_HOST:-postgres}:5432/${DB_NAME:-xray}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - WEBAUTHN_RP_NAME=${RP_NAME:-XRay BI}
      - WEBAUTHN_RP_ID=${RP_ID:-localhost}
      - WEBAUTHN_ORIGIN=${ORIGIN:-http://localhost:3000}
      - NODE_ENV=${NODE_ENV:-production}
      # Web Push (VAPID) for MEET call mobile notifications
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      # Fallback SMTP for first boot (before admin UI config)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
      # pg_backups mounted read-only so the Backups admin view can
      # report status (latest base, WAL count/lag, total size) by
      # reading the filesystem directly. RO is the load-bearing
      # word — a misbehaving server process can't corrupt the
      # operator's backup history. Triggering new backups + drills
      # is a separate (Phase B) concern — that path will go through
      # a worker / docker.sock approach, not this mount.
      - pg_backups:/var/lib/postgresql/backups:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Backup-worker sidecar — Phase B of the Backups admin UI.
  # Polls platform.backup_jobs and shells out to the matching script
  # in scripts/. Kept separate from the main server so the server
  # doesn't need docker.sock access (that would turn server compromise
  # into host compromise). The worker has docker.sock + the scripts
  # volume; nothing else.
  backup-worker:
    build:
      context: .
      dockerfile: server/backup-worker.Dockerfile
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=5432
      # Connect as the bootstrap super (xray) so the worker bypasses
      # RLS on platform.backup_jobs + platform.backup_drill_runs.
      # The application server uses xray_app and stays gated.
      - DB_USER=${DB_USER:-xray}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-xray}
      - POLL_INTERVAL_SEC=${BACKUP_WORKER_POLL_SEC:-5}
      # S3 mirror config — pass-through to backup-s3-sync.sh. Phase C
      # will move these to platform_settings + override at job-pickup
      # time, but the env-var path stays as a fallback.
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_REGION=${BACKUP_S3_REGION:-}
      - BACKUP_S3_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY_ID:-}
      - BACKUP_S3_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_ACCESS_KEY:-}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX:-}
      - BACKUP_RETAIN_DAYS=${BACKUP_RETAIN_DAYS:-14}
      # Tell the scripts where the postgres container lives so their
      # `docker exec postgres ...` calls land on the right service.
      - POSTGRES_CONTAINER=${COMPOSE_PROJECT_NAME:-xray}-postgres-1
    volumes:
      # Scripts mounted RO — operator updates propagate via git pull
      # without rebuilding the worker image.
      - ./scripts:/scripts:ro
      # docker.sock so the worker can `docker exec postgres ...` and
      # `docker run` the aws-cli + restore-drill sidecar containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Backup volume — workers write here when scripts call
      # pg_basebackup --dest=… inside the postgres container, but the
      # output_file in backup-worker.sh wants a writable scratch dir
      # too; use the same volume.
      - pg_backups:/var/lib/postgresql/backups
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-xray}
      - POSTGRES_USER=${DB_USER:-xray}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      # Local archive path used by scripts/wal-archive.sh inside the
      # postgres container. The S3 mirror layer (BACKUP_S3_*) runs on
      # the host out-of-band — see scripts/backup-s3-sync.sh — so
      # those env vars don't need to enter the postgres container.
      - BACKUP_ARCHIVE_DIR=/var/lib/postgresql/backups/wal
    volumes:
      - pg_data:/var/lib/postgresql/data
      - pg_backups:/var/lib/postgresql/backups
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/wal-archive.sh:/usr/local/bin/wal-archive.sh:ro
    # WAL archiving + base-backup compatible: archive_mode=on requires
    # wal_level >= replica (Postgres 16 default). The archive_command
    # delegates to the host-mounted shell script so the same logic is
    # versioned in the repo.
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=/usr/local/bin/wal-archive.sh %p %f
      - -c
      - archive_timeout=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xray}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  pg_backups:
  uploads_data:
