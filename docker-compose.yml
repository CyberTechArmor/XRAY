version: '3.8'

services:
  server:
    build:
      # Build context is the repo root so the Dockerfile can COPY both server/
      # and migrations/ (migrations are read at startup for self-healing).
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-xray}:${DB_PASSWORD}@${DB_HOST:-postgres}:5432/${DB_NAME:-xray}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - WEBAUTHN_RP_NAME=${RP_NAME:-XRay BI}
      - WEBAUTHN_RP_ID=${RP_ID:-localhost}
      - WEBAUTHN_ORIGIN=${ORIGIN:-http://localhost:3000}
      - NODE_ENV=${NODE_ENV:-production}
      # Web Push (VAPID) for MEET call mobile notifications
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      # Fallback SMTP for first boot (before admin UI config)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-xray}
      - POSTGRES_USER=${DB_USER:-xray}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      # Forwarded into the archive_command (see scripts/wal-archive.sh).
      # Local-archive path inside the named volume; the optional S3
      # mirror layered on top in step 12 (B2) is gated on these:
      - BACKUP_ARCHIVE_DIR=/var/lib/postgresql/backups/wal
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_REGION=${BACKUP_S3_REGION:-}
      - BACKUP_S3_ACCESS_KEY_ID=${BACKUP_S3_ACCESS_KEY_ID:-}
      - BACKUP_S3_SECRET_ACCESS_KEY=${BACKUP_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - pg_backups:/var/lib/postgresql/backups
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/wal-archive.sh:/usr/local/bin/wal-archive.sh:ro
    # WAL archiving + base-backup compatible: archive_mode=on requires
    # wal_level >= replica (Postgres 16 default). The archive_command
    # delegates to the host-mounted shell script so the same logic is
    # versioned in the repo.
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=/usr/local/bin/wal-archive.sh %p %f
      - -c
      - archive_timeout=300
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xray}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  pg_backups:
  uploads_data:
